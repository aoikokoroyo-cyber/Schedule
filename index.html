<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワクワクデープラン</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,sans-serif;
}

body{
  background:#f5f5f5;
  padding:16px;
}

h1{
  text-align:center;
  margin-bottom:16px;
}

.instructions{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:20px;
}

.instructions p{
  margin:6px 0;
}

.section{
  background:white;
  padding:16px;
  border-radius:16px;
  margin-bottom:20px;
}

.section-title{
  font-weight:bold;
  font-size:20px;
  margin-bottom:12px;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#4f46e5;
  color:white;
  padding:12px;
  border-radius:24px;
  text-align:center;
}

.slot{
  border:1px solid #ddd;
  border-radius:12px;
  padding:12px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.time{
  font-weight:bold;
}

.activity{
  background:#16a34a;
  color:white;
  padding:8px 14px;
  border-radius:20px;
}

.select-btn{
  border:none;
  background:#ddd;
  padding:8px 14px;
  border-radius:20px;
}

.plan-title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:12px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  width:90%;
  max-width:400px;
  padding:20px;
  border-radius:16px;
}

.modal select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

.modal button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:12px;
}

.save-btn{
  background:#4f46e5;
  color:white;
}

@media(min-width:900px){

  .plans{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }

}
</style>
</head>
<body>

<h1>ワクワクデープラン</h1>

<div class="instructions">
<p>・時間枠の「選択」を押して予定を入れられるよ</p>
<p>・配置済みの予定をタップすると削除できるよ</p>
<p>・プランはA、Bの２つ設定できるよ</p>
</div>

<div class="section">
<div class="section-title">やりたいこと</div>

<div class="cards">
<div class="card">映画を見る</div>
<div class="card">カラオケ</div>
<div class="card">プライベートサウナ</div>
<div class="card">お散歩</div>
<div class="card">マッサージ</div>
<div class="card">ご飯（軽め）</div>
<div class="card">ご飯（ガッツリ）</div>
<div class="card">お買い物</div>
</div>
</div>

<div class="plans">

<div class="section">
<div class="plan-title">プランA</div>
<div id="planA"></div>
</div>

<div class="section">
<div class="plan-title">プランB</div>
<div id="planB"></div>
</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<select id="activity"></select>

<select id="startHour"></select>

<select id="endHour"></select>

<button class="save-btn" onclick="saveActivity()">
設定する
</button>

<button onclick="closeModal()">
キャンセル
</button>

</div>

</div>

<script>

const ACTIVITIES=[
"映画を見る",
"カラオケ",
"プライベートサウナ",
"お散歩",
"マッサージ",
"ご飯（軽め）",
"ご飯（ガッツリ）",
"お買い物"
];

let schedules=
JSON.parse(
localStorage.getItem("wakuwaku")
)||{
A:{},
B:{}
};

let currentPlan="A";

function save(){

localStorage.setItem(
"wakuwaku",
JSON.stringify(schedules)
);

}

function renderPlan(planId,target){

const container=
document.getElementById(target);

container.innerHTML="";

for(let h=9;h<=21;h++){

const slot=
document.createElement("div");

slot.className="slot";

const value=
schedules[planId][h];

slot.innerHTML=
`
<div class="time">${h}:00</div>
`;

if(value){

const activity=
document.createElement("div");

activity.className="activity";

activity.textContent=value;

activity.onclick=()=>{

if(confirm("削除しますか？")){

delete schedules[planId][h];

save();

render();

}

};

slot.appendChild(activity);

}else{

const btn=
document.createElement("button");

btn.className="select-btn";

btn.textContent="選択";

btn.onclick=()=>{

openModal(planId,h);

};

slot.appendChild(btn);

}

container.appendChild(slot);

}

}

let selectedPlan;
let selectedHour;

function openModal(plan,h){

selectedPlan=plan;
selectedHour=h;

document.getElementById("startHour").value=h;
document.getElementById("endHour").value=h;

document.getElementById("modal").style.display="flex";

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

function saveActivity(){

const activity=
document.getElementById("activity").value;

const start=
Number(
document.getElementById("startHour").value
);

const end=
Number(
document.getElementById("endHour").value
);

for(let h=start;h<=end;h++){

schedules[selectedPlan][h]=activity;

}

save();

closeModal();

render();

}

function initModal(){

const activity=
document.getElementById("activity");

ACTIVITIES.forEach(a=>{

const option=
document.createElement("option");

option.value=a;
option.textContent=a;

activity.appendChild(option);

});

const start=
document.getElementById("startHour");

const end=
document.getElementById("endHour");

for(let h=9;h<=21;h++){

const o1=
document.createElement("option");

o1.value=h;
o1.textContent=`${h}:00`;

start.appendChild(o1);

const o2=
document.createElement("option");

o2.value=h;
o2.textContent=`${h}:00`;

end.appendChild(o2);

}

}

function render(){

renderPlan("A","planA");
renderPlan("B","planB");

}

initModal();
render();

</script>

</body>
</html>
