<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ワクワクデープラン</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  background:#f5f5f5;
  padding:16px;
}

h1{
  text-align:center;
  margin-bottom:16px;
}

.instructions{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:20px;
  line-height:1.8;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.container{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

.cards-panel{
  width:35%;
  background:white;
  border-radius:16px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.schedule-panel{
  flex:1;
  background:white;
  border-radius:16px;
  padding:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.plan-switch{
  display:flex;
  flex-direction:column;
  gap:12px;
  align-self:center;
}

.plan-btn{
  border:none;
  border-radius:999px;
  padding:12px 18px;
  background:#ddd;
  font-weight:bold;
}

.plan-btn.active{
  background:#4f46e5;
  color:white;
}

.section-title{
  font-weight:bold;
  margin-bottom:12px;
  font-size:18px;
}

#cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  background:#4f46e5;
  color:white;
  padding:12px;
  border-radius:24px;
  text-align:center;
}

.slot{
  border:2px dashed #ddd;
  border-radius:16px;
  padding:12px;
  margin-bottom:10px;
  min-height:72px;
}

.slot-header{
  font-weight:bold;
  margin-bottom:8px;
}

.empty-btn{
  width:100%;
  border:none;
  background:#f0f0f0;
  border-radius:999px;
  padding:10px;
}

.scheduled-card{
  background:#16a34a;
  color:white;
  border-radius:24px;
  padding:12px;
  text-align:center;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:white;
  width:90%;
  max-width:420px;
  border-radius:16px;
  padding:20px;
}

.modal-title{
  font-weight:bold;
  margin-bottom:15px;
}

.modal-select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
}

.modal-row{
  margin-bottom:12px;
}

.modal-btn{
  width:100%;
  border:none;
  padding:12px;
  border-radius:999px;
  margin-top:8px;
}

.primary{
  background:#4f46e5;
  color:white;
}

.secondary{
  background:#ddd;
}

@media(max-width:900px){

  .container{
    flex-direction:column;
  }

  .cards-panel{
    width:100%;
  }

  .plan-switch{
    flex-direction:row;
    width:100%;
    justify-content:center;
  }

}

</style>
</head>
<body>

<h1>ワクワクデープラン</h1>

<div class="instructions">
  <strong>使い方</strong><br>
  ・時間枠の「選択」を押して予定を入れられるよ<br>
  ・配置済みの予定をタップすると削除できるよ<br>
  ・プランはA、Bの２つ設定できるよ
</div>

<div class="container">

  <div class="cards-panel">

    <div class="section-title">
      やりたいこと
    </div>

    <div id="cards"></div>

  </div>

  <div class="plan-switch">

    <button
      id="btnA"
      class="plan-btn"
      onclick="switchPlan('A')">
      プランA
    </button>

    <button
      id="btnB"
      class="plan-btn"
      onclick="switchPlan('B')">
      プランB
    </button>

  </div>

  <div class="schedule-panel">

    <div class="section-title">
      スケジュール
    </div>

    <div id="schedule"></div>

  </div>

</div>

<div class="modal" id="modal">

  <div class="modal-content">

    <div class="modal-title">
      予定を設定
    </div>

    <div class="modal-row">
      <label>やりたいこと</label>
      <select id="activity" class="modal-select"></select>
    </div>

    <div class="modal-row">
      <label>開始時間</label>
      <select id="startHour" class="modal-select"></select>
    </div>

    <div class="modal-row">
      <label>終了時間</label>
      <select id="endHour" class="modal-select"></select>
    </div>

    <button
      class="modal-btn primary"
      onclick="saveActivity()">
      設定する
    </button>

    <button
      class="modal-btn secondary"
      onclick="closeModal()">
      キャンセル
    </button>

  </div>

</div>

<script>

const HOURS=[];

for(let h=9;h<=21;h++){
  HOURS.push(h);
}

const ACTIVITIES=[
"映画を見る",
"カラオケ",
"プライベートサウナ",
"お散歩",
"マッサージ",
"ご飯（軽め）",
"ご飯（ガッツリ）",
"お買い物"
];

let currentPlan=
localStorage.getItem("currentPlan") || "A";

let schedules=
JSON.parse(
localStorage.getItem("schedules")
) || {
A:{},
B:{}
};

let selectedHour=9;

function save(){

localStorage.setItem(
"schedules",
JSON.stringify(schedules)
);

localStorage.setItem(
"currentPlan",
currentPlan
);

}

function switchPlan(plan){

currentPlan=plan;

save();

updateButtons();

renderSchedule();

}

function updateButtons(){

document
.getElementById("btnA")
.classList.toggle(
"active",
currentPlan==="A"
);

document
.getElementById("btnB")
.classList.toggle(
"active",
currentPlan==="B"
);

}

function renderCards(){

const cards=
document.getElementById("cards");

cards.innerHTML="";

ACTIVITIES.forEach(item=>{

const div=
document.createElement("div");

div.className="card";

div.textContent=item;

cards.appendChild(div);

});

}

function renderSchedule(){

const container=
document.getElementById("schedule");

container.innerHTML="";

HOURS.forEach(hour=>{

const slot=
document.createElement("div");

slot.className="slot";

slot.innerHTML=
`<div class="slot-header">${hour}:00</div>`;

const activity=
schedules[currentPlan][hour];

if(activity){

const card=
document.createElement("div");

card.className=
"scheduled-card";

card.textContent=
activity;

card.onclick=()=>{

if(confirm("削除しますか？")){

delete schedules
[currentPlan]
[hour];

save();

renderSchedule();

}

};

slot.appendChild(card);

}else{

const btn=
document.createElement("button");

btn.className=
"empty-btn";

btn.textContent=
"選択";

btn.onclick=()=>{

openModal(hour);

};

slot.appendChild(btn);

}

container.appendChild(slot);

});

}

function openModal(hour){

selectedHour=hour;

document
.getElementById("startHour")
.value=hour;

document
.getElementById("endHour")
.value=hour;

document
.getElementById("modal")
.style.display="flex";

}

function closeModal(){

document
.getElementById("modal")
.style.display="none";

}

function saveActivity(){

const activity=
document
.getElementById("activity")
.value;

const start=
Number(
document
.getElementById("startHour")
.value
);

const end=
Number(
document
.getElementById("endHour")
.value
);

for(
let h=start;
h<=end;
h++
){

schedules[currentPlan][h]
=
activity;

}

save();

closeModal();

renderSchedule();

}

function initModal(){

const activity=
document
.getElementById("activity");

ACTIVITIES.forEach(item=>{

const option=
document.createElement("option");

option.value=item;

option.textContent=item;

activity.appendChild(option);

});

const start=
document
.getElementById("startHour");

const end=
document
.getElementById("endHour");

HOURS.forEach(hour=>{

const o1=
document.createElement("option");

o1.value=hour;
o1.textContent=
hour + ":00";

start.appendChild(o1);

const o2=
document.createElement("option");

o2.value=hour;
o2.textContent=
hour + ":00";

end.appendChild(o2);

});

}

initModal();
updateButtons();
renderCards();
renderSchedule();

</script>

</body>
</html>
