<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ワクワクデープラン</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
  background:#f5f5f5;
  padding:16px;
}

h1{
  text-align:center;
  margin-bottom:15px;
}

.instructions{
  background:white;
  padding:14px;
  border-radius:16px;
  margin-bottom:16px;
  line-height:1.8;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.plan-switch{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
}

.plan-btn{
  border:none;
  padding:10px 18px;
  border-radius:999px;
  background:#ddd;
  font-weight:bold;
}

.plan-btn.active{
  background:#4f46e5;
  color:white;
}

.container{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.cards-panel{
  flex:1;
  min-width:280px;
  background:white;
  padding:16px;
  border-radius:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.schedule-panel{
  flex:2;
  min-width:320px;
  background:white;
  padding:16px;
  border-radius:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.section-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:12px;
}

.card{
  background:#4f46e5;
  color:white;
  padding:14px;
  border-radius:24px;
  margin-bottom:12px;
  text-align:center;
  cursor:grab;
  touch-action:none;
  user-select:none;
}

.slot{
  border:2px dashed #ddd;
  border-radius:16px;
  min-height:80px;
  margin-bottom:10px;
  padding:10px;
}

.slot-header{
  font-weight:bold;
  margin-bottom:8px;
}

.scheduled-card{
  background:#16a34a;
  color:white;
  padding:12px;
  border-radius:24px;
  text-align:center;
}

@media(max-width:768px){

  .container{
    flex-direction:column;
  }

}

</style>
</head>

<body>

<h1>ワクワクデープラン</h1>

<div class="plan-switch">
  <button id="btnA" class="plan-btn" onclick="switchPlan('A')">プランA</button>
  <button id="btnB" class="plan-btn" onclick="switchPlan('B')">プランB</button>
</div>

<div class="instructions">
  <strong>使い方</strong><br>
  ・左のカードを長押しして時間枠へ移動します。<br>
  ・配置済みカードをタップすると削除できます。<br>
  ・プランAとプランBを切り替えて比較できます。<br>
  ・内容は自動保存されます。
</div>

<div class="container">

  <div class="cards-panel">

    <div class="section-title">
      やりたいこと
    </div>

    <div id="cards"></div>

  </div>

  <div class="schedule-panel">

    <div class="section-title">
      スケジュール
    </div>

    <div id="schedule"></div>

  </div>

</div>

<script>

const HOURS = [];

for(let h=9; h<=21; h++){
  HOURS.push(`${h}:00`);
}

const cards = [
  "映画を見る",
  "カラオケ",
  "プライベートサウナ",
  "お散歩",
  "マッサージ",
  "ご飯（軽め）",
  "ご飯（ガッツリ）",
  "お買い物"
];

let currentPlan =
localStorage.getItem("currentPlan") || "A";

let schedules =
JSON.parse(
  localStorage.getItem("schedules")
) || {
  A:{},
  B:{}
};

function save(){

  localStorage.setItem(
    "schedules",
    JSON.stringify(schedules)
  );

  localStorage.setItem(
    "currentPlan",
    currentPlan
  );

}

function updatePlanButtons(){

  document
    .getElementById("btnA")
    .classList
    .remove("active");

  document
    .getElementById("btnB")
    .classList
    .remove("active");

  document
    .getElementById(
      currentPlan === "A"
      ? "btnA"
      : "btnB"
    )
    .classList
    .add("active");

}

function switchPlan(plan){

  currentPlan = plan;

  save();

  updatePlanButtons();

  renderSchedule();

}

function renderCards(){

  const container =
  document.getElementById("cards");

  container.innerHTML = "";

  cards.forEach(card=>{

    const div =
    document.createElement("div");

    div.className = "card";

    div.draggable = true;

    div.textContent = card;

    div.addEventListener(
      "dragstart",
      e=>{
        e.dataTransfer.setData(
          "text/plain",
          card
        );
      }
    );

    container.appendChild(div);

  });

}

function renderSchedule(){

  const scheduleDiv =
  document.getElementById("schedule");

  scheduleDiv.innerHTML = "";

  HOURS.forEach(hour=>{

    const slot =
    document.createElement("div");

    slot.className = "slot";

    slot.innerHTML = `
      <div class="slot-header">
        ${hour}
      </div>
    `;

    slot.addEventListener(
      "dragover",
      e=>{
        e.preventDefault();
      }
    );

    slot.addEventListener(
      "drop",
      e=>{

        e.preventDefault();

        const card =
        e.dataTransfer.getData(
          "text/plain"
        );

        schedules[currentPlan][hour]
        = card;

        save();

        renderSchedule();

      }
    );

    if(
      schedules[currentPlan][hour]
    ){

      const card =
      document.createElement("div");

      card.className =
      "scheduled-card";

      card.textContent =
      schedules[currentPlan][hour];

      card.addEventListener(
        "click",
        ()=>{

          delete schedules
            [currentPlan]
            [hour];

          save();

          renderSchedule();

        }
      );

      slot.appendChild(card);

    }

    scheduleDiv.appendChild(slot);

  });

}

updatePlanButtons();
renderCards();
renderSchedule();

</script>

</body>
</html>
