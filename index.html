<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 ワクワクデープラン 🌸</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  background:linear-gradient(
    180deg,
    #fff7fb 0%,
    #fdf6ff 100%
  );
  padding:16px;
  color:#555;
}

h1{
  text-align:center;
  margin-bottom:16px;
  color:#ff6fa5;
  font-size:30px;
  font-weight:700;
}

.instructions{
  background:white;
  padding:16px;
  border-radius:24px;
  margin-bottom:20px;
  box-shadow:0 4px 15px rgba(255,111,165,.15);
}

.instructions p{
  margin:8px 0;
  line-height:1.6;
}

.section{
  background:white;
  padding:16px;
  border-radius:24px;
  margin-bottom:20px;
  box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.section-title{
  font-weight:bold;
  font-size:20px;
  margin-bottom:12px;
  color:#ff6fa5;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:linear-gradient(
    135deg,
    #ffb7d5,
    #ff8fc7
  );
  color:white;
  padding:14px;
  border-radius:999px;
  text-align:center;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(255,143,199,.35);
}

.plans{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.plan-box{
  background:white;
  border-radius:24px;
  padding:12px;
  box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.plan-title{
  font-size:20px;
  font-weight:bold;
  text-align:center;
  padding:12px;
  border-radius:999px;
  cursor:pointer;
  user-select:none;
  margin-bottom:10px;
}

.plan-a{
  background:#dff1ff;
  color:#4d9fff;
}

.plan-b{
  background:#ffe9d7;
  color:#ff9b43;
}

.slot{
  background:#fffdfd;
  border:2px solid #ffe1ee;
  border-radius:18px;
  padding:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.time{
  font-weight:bold;
  color:#888;
}

.activity{
  background:linear-gradient(
    135deg,
    #8ee4a8,
    #67d98d
  );
  color:white;
  padding:8px 14px;
  border-radius:999px;
  font-weight:bold;
  box-shadow:0 3px 8px rgba(103,217,141,.25);
}

.select-btn{
  border:none;
  background:#ffd9ec;
  color:#ff4f96;
  padding:8px 14px;
  border-radius:999px;
  font-weight:bold;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  width:90%;
  max-width:400px;
  padding:20px;
  border-radius:24px;
}

.modal select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:2px solid #ffd9ec;
}

.modal button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:999px;
}

.save-btn{
  background:linear-gradient(
    135deg,
    #ff8fc7,
    #ff6fa5
  );
  color:white;
}

@media(max-width:900px){

  h1{
    font-size:24px;
  }

  .plans{
    grid-template-columns:1fr 1fr;
  }

  .card{
    font-size:12px;
  }

  .plan-title{
    font-size:16px;
  }

}

</style>
</head>

<body>

<h1>🌸 ワクワクデープラン 🌸</h1>

<div class="instructions">
<p>・時間枠の「選択」を押して予定を入れられるよ</p>
<p>・配置済みの予定をタップすると削除できるよ</p>
<p>・プランはA、Bの２つ設定できるよ</p>
<p>・せーので開いて答え合わせもできるよ</p>
</div>

<div class="section">

<div class="section-title">
やりたいこと
</div>

<div class="cards">

<div class="card">🎬 映画を見る</div>
<div class="card">🎤 カラオケ</div>
<div class="card">🧖 プライベートサウナ</div>
<div class="card">🚶 お散歩</div>
<div class="card">💆 マッサージ</div>
<div class="card">🥗 ご飯（軽め）</div>
<div class="card">🍖 ご飯（ガッツリ）</div>
<div class="card">🛍️ お買い物</div>
<div class="card">🐱 猫カフェ</div>
<div class="card">🐶 ペットショップ</div>

</div>

</div>

<div class="plans">

<div class="plan-box">

<div
id="titleA"
class="plan-title plan-a">
💙 プランA ▼
</div>

<div id="planA"></div>

</div>

<div class="plan-box">

<div
id="titleB"
class="plan-title plan-b">
🧡 プランB ▶
</div>

<div id="planB"></div>

</div>

</div>

<div
class="modal"
id="modal">

<div class="modal-content">

<select id="activity"></select>

<select id="startHour"></select>

<select id="endHour"></select>

<button
class="save-btn"
onclick="saveActivity()">

設定する

</button>

<button
onclick="closeModal()">

キャンセル

</button>

</div>

</div>

<script>

const ACTIVITIES=[
"🎬 映画を見る",
"🎤 カラオケ",
"🧖 プライベートサウナ",
"🚶 お散歩",
"💆 マッサージ",
"🥗 ご飯（軽め）",
"🍖 ご飯（ガッツリ）",
"🛍️ お買い物",
"🐱 猫カフェ",
"🐶 ペットショップ"
];

let schedules=
JSON.parse(
localStorage.getItem("wakuwaku")
)||{
A:{},
B:{}
};

let planVisible={
A:true,
B:false
};

let selectedPlan;
let selectedHour;

function save(){

  localStorage.setItem(
    "wakuwaku",
    JSON.stringify(schedules)
  );

}

function openModal(plan,h){

  selectedPlan=plan;
  selectedHour=h;

  document.getElementById(
    "startHour"
  ).value=h;

  document.getElementById(
    "endHour"
  ).value=h;

  document.getElementById(
    "modal"
  ).style.display="flex";

}

function closeModal(){

  document.getElementById(
    "modal"
  ).style.display="none";

}

function saveActivity(){

  const activity=
  document.getElementById(
    "activity"
  ).value;

  const start=
  Number(
    document.getElementById(
      "startHour"
    ).value
  );

  const end=
  Number(
    document.getElementById(
      "endHour"
    ).value
  );

  for(
    let h=start;
    h<=end;
    h++
  ){

    schedules[selectedPlan][h]
    = activity;

  }

  save();

  closeModal();

  render();

}

function renderPlan(planId,target){

  const container=
  document.getElementById(target);

  container.innerHTML="";

  if(
    !planVisible[planId]
  ){
    return;
  }

  for(
    let h=9;
    h<=21;
    h++
  ){

    const slot=
    document.createElement("div");

    slot.className="slot";

    const value=
    schedules[planId][h];

    slot.innerHTML=
    `
      <div class="time">
        ${h}:00
      </div>
    `;

    if(value){

      const activity=
      document.createElement("div");

      activity.className=
      "activity";

      activity.textContent=
      value;

      activity.onclick=()=>{

        if(
          confirm(
            "削除しますか？"
          )
        ){

          delete schedules
          [planId][h];

          save();

          render();

        }

      };

      slot.appendChild(
        activity
      );

    }else{

      const btn=
      document.createElement(
        "button"
      );

      btn.className=
      "select-btn";

      btn.textContent=
      "選択";

      btn.onclick=()=>{

        openModal(
          planId,
          h
        );

      };

      slot.appendChild(btn);

    }

    container.appendChild(
      slot
    );

  }

}

function render(){

  document.getElementById(
    "titleA"
  ).innerHTML=
  planVisible.A
  ? "💙 プランA ▼"
  : "💙 プランA ▶";

  document.getElementById(
    "titleB"
  ).innerHTML=
  planVisible.B
  ? "🧡 プランB ▼"
  : "🧡 プランB ▶";

  renderPlan(
    "A",
    "planA"
  );

  renderPlan(
    "B",
    "planB"
  );

}

function initModal(){

  const activity=
  document.getElementById(
    "activity"
  );

  ACTIVITIES.forEach(a=>{

    const option=
    document.createElement(
      "option"
    );

    option.value=a;
    option.textContent=a;

    activity.appendChild(
      option
    );

  });

  const start=
  document.getElementById(
    "startHour"
  );

  const end=
  document.getElementById(
    "endHour"
  );

  for(
    let h=9;
    h<=21;
    h++
  ){

    const o1=
    document.createElement(
      "option"
    );

    o1.value=h;
    o1.textContent=
    `${h}:00`;

    start.appendChild(o1);

    const o2=
    document.createElement(
      "option"
    );

    o2.value=h;
    o2.textContent=
    `${h}:00`;

    end.appendChild(o2);

  }

}

document.getElementById(
  "titleA"
).onclick=()=>{

  planVisible.A=
  !planVisible.A;

  render();

};

document.getElementById(
  "titleB"
).onclick=()=>{

  planVisible.B=
  !planVisible.B;

  render();

};

initModal();
render();

</script>

</body>
</html>
